<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agentic AI — Knowledge Base</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg2: #1a1d2e;
  --bg3: #242840;
  --border: #2d3155;
  --accent: #7c6af7;
  --accent2: #56c8d8;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --code-bg: #0d1117;
  --sidebar-w: 280px;
  --radius: 8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh;display:flex;flex-direction:column}

/* ── Topbar ── */
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(15,17,23,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center;padding:0 20px;gap:16px}
.topbar .logo{font-weight:700;font-size:1.1rem;color:var(--accent);text-decoration:none;white-space:nowrap}
.topbar .logo span{color:var(--accent2)}
.search-wrap{flex:1;max-width:520px;position:relative}
#search-input{width:100%;padding:8px 16px 8px 40px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:100%;font-weight:500}
#search-input::placeholder{color:var(--text2);}
.search-wrap.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%)}
.search-icon{display:inline-block;width:16px;height:16px;form-action:search!important}
.search-icon svg{fill:currentColor;width:100%;height:100%}

/* ┃Sidebar Start ┃ */
.sidebar {
  position: fixed;
  width: var(--sidebar-w);
  left: 0;
  top: 56px;
  bottom: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 20px 0;
}
